name: Generate iOS Files

on:
  push:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Создаём папки
        run: |
          mkdir -p System/usr/lib
          mkdir -p System/usr/bin
          echo "✅ Папки созданы"

      - name: Создаём 1000 файлов
        run: |
          for i in $(seq 1 1000); do
            echo "iOS Library $i" > "System/usr/lib/lib_$i.dylib"
          done
          echo "✅ 1000 файлов создано"

      - name: Сохраняем
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add System/
          git commit -m "Добавлены файлы" || echo "Нет изменений"
          git push || echo "Готово"