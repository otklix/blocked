name: Generate iOS Files

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Delete old files
        run: rm -rf System/
      
      - name: Create folders
        run: |
          mkdir -p System/usr/lib
          mkdir -p System/usr/bin
          mkdir -p System/Library/Frameworks
          echo "Folders created"
      
      - name: Generate 50 000 files
        run: |
          for i in $(seq 1 50000); do
            echo "iOS Library $i" > "System/usr/lib/lib_$i.dylib"
          done
          echo "50 000 files created"
      
      - name: Generate 30 000 commands
        run: |
          for i in $(seq 1 30000); do
            echo "#!/bin/bash" > "System/usr/bin/cmd_$i"
            echo "echo 'Command $i'" >> "System/usr/bin/cmd_$i"
            chmod +x "System/usr/bin/cmd_$i"
          done
          echo "30 000 commands created"
      
      - name: Push to repository
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add System/
          git commit -m "Add 80 000 iOS files" || echo "No changes"
          git push || echo "Push done"