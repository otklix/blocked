name: Generate iOS Files

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Create folders
        run: |
          mkdir -p System/usr/lib
          mkdir -p System/Library/Frameworks
          echo "Folders created"
      
      - name: Create 1000 files
        run: |
          for i in $(seq 1 1000); do
            echo "File $i" > "System/usr/lib/lib_$i.dylib"
          done
          echo "1000 files created"
      
      - name: Commit
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add System/
          git commit -m "Add system files" || echo "No changes"
          git push || echo "Push failed"