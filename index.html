<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Downloader</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="url"] {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102,126,234,0.3);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .btn-success {
            background: #10b981;
            color: white;
        }
        .btn-success:hover {
            background: #059669;
            transform: translateY(-2px);
        }
        .btn-danger {
            background: #ef4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-secondary {
            background: #e5e7eb;
            color: #333;
        }
        .btn-secondary:hover {
            background: #d1d5db;
        }
        .hidden {
            display: none !important;
        }
        #playlistInfo {
            margin-top: 20px;
            padding: 16px;
            background: #f0f4ff;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }
        #playlistInfo h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 8px;
        }
        #playlistInfo p {
            font-size: 14px;
            color: #666;
            margin-bottom: 4px;
        }
        #tracksList {
            margin-top: 15px;
            max-height: 200px;
            overflow-y: auto;
        }
        .track-item {
            padding: 8px 12px;
            background: white;
            border-radius: 8px;
            margin-bottom: 4px;
            font-size: 13px;
            color: #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .track-item .index {
            color: #999;
            font-weight: 600;
            margin-right: 10px;
        }
        .track-item .artist {
            color: #667eea;
            font-weight: 500;
        }
        .progress-container {
            margin-top: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 5px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
            width: 0%;
        }
        .status-text {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin-top: 10px;
        }
        .settings-group {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px dashed #e5e7eb;
        }
        .settings-group h4 {
            font-size: 14px;
            color: #555;
            margin-bottom: 10px;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success {
            background: #d1fae5;
            color: #065f46;
        }
        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }
        .error-message {
            color: #ef4444;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #fee2e2;
            border-radius: 8px;
        }
        .success-message {
            color: #10b981;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #d1fae5;
            border-radius: 8px;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .btn-group .btn {
            flex: 1;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 12px;
            color: #999;
        }
        .footer a {
            color: #667eea;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>
            🎵 Music Downloader
            <span class="badge badge-success" id="statusBadge">Готов</span>
        </h1>
        <p class="subtitle">Скачивай плейлисты с Яндекс Музыки</p>

        <div id="step1">
            <div class="input-group">
                <label>🔗 Ссылка на плейлист Яндекс Музыки</label>
                <input type="url" id="playlistUrl" placeholder="https://music.yandex.ru/users/.../playlists/...">
            </div>
            <button class="btn btn-primary" id="parseBtn" onclick="parsePlaylist()">
                📥 Получить треки
            </button>
        </div>

        <div id="step2" class="hidden">
            <div id="playlistInfo">
                <h3 id="playlistTitle">Название плейлиста</h3>
                <p>🎵 <span id="trackCount">0</span> треков</p>
                <div id="tracksList"></div>
            </div>

            <div class="settings-group">
                <h4>⚙️ Настройки переименования</h4>
                <div class="input-group">
                    <label>Новое название (оставь пустым для оригинала)</label>
                    <input type="text" id="customName" placeholder="Например: Легенда">
                </div>
                <div class="input-group">
                    <label>Новый исполнитель (оставь пустым для оригинала)</label>
                    <input type="text" id="customArtist" placeholder="Например: Новый исполнитель">
                </div>
            </div>

            <div class="btn-group">
                <button class="btn btn-success" id="downloadBtn" onclick="downloadTracks()">
                    ⬇️ Скачать все
                </button>
                <button class="btn btn-secondary" onclick="resetAll()">
                    🔄 Заново
                </button>
            </div>
        </div>

        <div id="step3" class="hidden">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="status-text" id="statusText">Начинаем загрузку...</div>
            </div>
            <button class="btn btn-danger" onclick="resetAll()" style="margin-top: 15px;">
                ⏹ Отменить
            </button>
        </div>

        <div id="messageContainer"></div>

        <div class="footer">
            Telegram Mini App · <a href="#" onclick="closeApp()">Закрыть</a>
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        let userData = {
            userId: null,
            playlist: null,
            tracks: []
        };

        document.addEventListener('DOMContentLoaded', function() {
            if (tg) {
                tg.ready();
                tg.expand();
                userData.userId = tg.initDataUnsafe?.user?.id || 'anonymous';
            } else {
                userData.userId = 'test_user_' + Date.now();
            }
        });

        function closeApp() {
            if (tg) tg.close();
            else alert('Закрыть можно только в Telegram');
        }

        async function parsePlaylist() {
            const urlInput = document.getElementById('playlistUrl');
            const url = urlInput.value.trim();
            
            if (!url) {
                showMessage('Введите ссылку на плейлист', 'error');
                return;
            }

            if (!url.includes('music.yandex.ru') && !url.includes('yandex.ru/music')) {
                showMessage('Это не ссылка на Яндекс Музыку', 'error');
                return;
            }

            const btn = document.getElementById('parseBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loader"></span> Загрузка...';
            
            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'parse_playlist',
                        url: url,
                        user_id: userData.userId
                    })
                });

                const data = await response.json();

                if (data.success) {
                    userData.playlist = data.playlist;
                    userData.tracks = data.playlist.tracks;
                    showPlaylistInfo(data.playlist);
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                    updateBadge('success', 'Готово');
                    showMessage(`Найдено ${data.playlist.count} треков!`, 'success');
                } else {
                    showMessage('Ошибка: ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('Ошибка подключения к серверу', 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = '📥 Получить треки';
            }
        }

        function showPlaylistInfo(playlist) {
            document.getElementById('playlistTitle').textContent = '📀 ' + playlist.title;
            document.getElementById('trackCount').textContent = playlist.count;

            const list = document.getElementById('tracksList');
            list.innerHTML = '';
            
            const displayTracks = playlist.tracks.slice(0, 20);
            displayTracks.forEach((track, index) => {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.innerHTML = `
                    <span>
                        <span class="index">${index + 1}.</span>
                        <span class="artist">${track.artist}</span> - ${track.title}
                    </span>
                `;
                list.appendChild(div);
            });

            if (playlist.count > 20) {
                const div = document.createElement('div');
                div.className = 'track-item';
                div.style.textAlign = 'center';
                div.style.color = '#999';
                div.textContent = `... и ещё ${playlist.count - 20} треков`;
                list.appendChild(div);
            }
        }

        async function downloadTracks() {
            const customName = document.getElementById('customName').value.trim();
            const customArtist = document.getElementById('customArtist').value.trim();

            if (userData.tracks.length === 0) {
                showMessage('Нет треков для скачивания', 'error');
                return;
            }

            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.remove('hidden');
            updateBadge('warning', 'Загрузка...');
            updateProgress(0, 'Начинаем загрузку...');

            try {
                const response = await fetch('/api', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        action: 'download_tracks',
                        user_id: userData.userId,
                        custom_name: customName || null,
                        custom_artist: customArtist || null
                    })
                });

                const data = await response.json();

                if (data.success) {
                    updateProgress(100, '✅ Все треки скачаны!');
                    showMessage('Треки отправлены в Telegram!', 'success');
                    setTimeout(resetAll, 3000);
                } else {
                    updateProgress(0, '❌ Ошибка: ' + data.error);
                    showMessage('Ошибка: ' + data.error, 'error');
                    setTimeout(resetAll, 5000);
                }
            } catch (error) {
                updateProgress(0, '❌ Ошибка подключения');
                showMessage('Ошибка подключения к серверу', 'error');
            }
        }

        function updateProgress(percent, text) {
            document.getElementById('progressFill').style.width = percent + '%';
            document.getElementById('statusText').textContent = text;
        }

        function updateBadge(type, text) {
            const badge = document.getElementById('statusBadge');
            badge.className = 'badge badge-' + type;
            badge.textContent = text;
        }

        function showMessage(text, type) {
            const container = document.getElementById('messageContainer');
            const div = document.createElement('div');
            div.className = type === 'error' ? 'error-message' : 'success-message';
            div.textContent = text;
            container.innerHTML = '';
            container.appendChild(div);
            
            setTimeout(() => {
                if (div.parentNode) div.remove();
            }, 5000);
        }

        function resetAll() {
            document.getElementById('step1').classList.remove('hidden');
            document.getElementById('step2').classList.add('hidden');
            document.getElementById('step3').classList.add('hidden');
            document.getElementById('playlistUrl').value = '';
            document.getElementById('customName').value = '';
            document.getElementById('customArtist').value = '';
            document.getElementById('tracksList').innerHTML = '';
            document.getElementById('messageContainer').innerHTML = '';
            updateBadge('success', 'Готов');
            userData.tracks = [];
            userData.playlist = null;
        }

        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && document.activeElement?.id === 'playlistUrl') {
                parsePlaylist();
            }
        });
    </script>
</body>
</html>
